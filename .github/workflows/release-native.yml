name: Release Native

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

env:
  PROJECT_NAME: Fz10m

permissions:
  contents: write  # needed to create the GitHub Release

jobs:
  build:
    name: Build ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest]
        include:
          - os: macos-latest
            build_dir: build-mac
          - os: windows-latest
            build_dir: build-win

    steps:
    - name: Check out repository
      uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Get VST3 SDK
      shell: bash
      run: |
        cd iPlug2/Dependencies/IPlug
        ./download-iplug-sdks.sh

    - name: Get Prebuilt Libs
      shell: bash
      run: |
        cd iPlug2/Dependencies
        ./download-prebuilt-libs.sh

    # ---------- macOS ----------
    - name: Get archive name (macOS)
      id: mac_archivename
      if: matrix.os == 'macos-latest'
      shell: bash
      run: |
        # get_archive_name.py takes a projectpath that contains config.h.
        # In our flat layout config.h sits at repo root, so projectpath is "."
        # (in the OOS layout upstream iPlug2 assumed, it would be the subdir).
        name=$(python3 iPlug2/Scripts/get_archive_name.py . mac full)
        echo "name=${name}" >> "$GITHUB_OUTPUT"

    - name: Build macOS
      if: matrix.os == 'macos-latest'
      shell: bash
      run: |
        cd scripts
        ./makedist-mac.sh full installer

    - name: Stage macOS artefacts
      if: matrix.os == 'macos-latest'
      shell: bash
      run: |
        mkdir -p artefacts
        name="${{ steps.mac_archivename.outputs.name }}"
        cp "${{ matrix.build_dir }}/out/${name}-dSYMs.zip" artefacts/
        cp "${{ matrix.build_dir }}/out/${name}.dmg" artefacts/

    # ---------- Windows ----------
    - name: Setup Python (Windows)
      if: matrix.os == 'windows-latest'
      uses: actions/setup-python@v5
      with:
        python-version: '3.x'
        architecture: 'x64'

    - name: Add MSBuild to PATH (Windows)
      if: matrix.os == 'windows-latest'
      uses: microsoft/setup-msbuild@v2

    - name: Get archive name (Windows)
      id: win_archivename
      if: matrix.os == 'windows-latest'
      shell: bash
      run: |
        # See note above in mac step — projectpath is "." for flat layout.
        name=$(python.exe iPlug2/Scripts/get_archive_name.py . win full)
        echo "name=${name}" >> "$GITHUB_OUTPUT"

    - name: Build Windows
      if: matrix.os == 'windows-latest'
      shell: pwsh
      run: |
        cd scripts
        .\makedist-win.bat full installer

    - name: Stage Windows artefacts
      if: matrix.os == 'windows-latest'
      shell: bash
      run: |
        mkdir -p artefacts
        name="${{ steps.win_archivename.outputs.name }}"
        cp "${{ matrix.build_dir }}/out/${name}-pdbs.zip" artefacts/
        cp "${{ matrix.build_dir }}/out/${name}.zip" artefacts/

    # ---------- Upload artefacts to the workflow run ----------
    - name: Upload workflow artefacts
      uses: actions/upload-artifact@v4
      with:
        name: ${{ matrix.os }}-artefacts
        path: artefacts/
        if-no-files-found: error

  publish_release:
    name: Publish GitHub Release
    needs: build
    # Only publish when triggered by a tag push; manual runs only build.
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
    - name: Check out repository
      uses: actions/checkout@v4

    - name: Download all artefacts
      uses: actions/download-artifact@v4
      with:
        path: downloaded-artefacts
        merge-multiple: true

    - name: Create GitHub Release with artefacts
      uses: softprops/action-gh-release@v2
      with:
        draft: true
        body_path: installer/changelog.txt
        files: downloaded-artefacts/**
